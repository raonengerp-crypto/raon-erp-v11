splay:grid;grid-template-columns:1fr 1.05fr;gap:12px;margin:12px 0}.formGrid,.quoteFormGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px 12px}.full,.wide{grid-column:1/-1}label{display:block;font-weight:800;color:#475569;margin-bottom:4px;font-size:12px}input,select,textarea{width:100%;padding:8px 9px;border:1px solid var(--line);border-radius:9px;background:#fff}.muted{color:var(--muted);font-size:12px}.quoteTabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.quoteTabs button.active{background:var(--blue);color:#fff}.pill{padding:5px 8px;background:#eef4ff;border:1px solid #d6e6ff;border-radius:999px;font-weight:700}.warn{background:#fff7ed;border-color:#fed7aa;color:#c2410c}.bad{background:#fef2f2;border-color:#fecaca;color:#dc2626}.good{background:#ecfdf5;border-color:#bbf7d0;color:#15803d}.modal{position:fixed;inset:0;background:rgba(2,8,23,.45);display:none;align-items:center;justify-content:center;z-index:20}.modal.on{display:flex}.modalBox{background:#fff;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.25);padding:20px;width:min(820px,94vw);max-height:90vh;overflow:auto}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}.matGrid,.taxMain{grid-template-columns:1fr 1fr}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:7px 10px;background:#eef4ff;border:1px solid #d6e6ff;border-radius:999px;font-weight:700}.taxKpis{grid-template-columns:repeat(6,1fr)}@media(max-width:1450px){.kpis{grid-template-columns:repeat(2,1fr)}.mainDash,.taxMain{grid-template-columns:1fr}.fieldLayout{grid-template-columns:245px 1fr}.rightInfo{display:none}.moneyGrid,.infoGrid,.taxKpis{grid-template-columns:repeat(2,1fr)}}@media(max-width:900px){.nav{overflow:auto;gap:12px}.quoteInfoGrid,.formGrid,.quoteFormGrid,.fieldLayout,.matGrid,.kpis,.moneyGrid,.infoGrid,.taxKpis{grid-template-columns:1fr}.quick{grid-template-columns:repeat(2,1fr)}.day{min-height:75px}.donutRow{grid-template-columns:1fr}.rightInfo{display:none}}
</style></head><body><header class="top"><div class="brand"><div class="logo">R</div><div><h1>RAON E&G ERP v12.6</h1><p>견적관리 Product DB / 멀티 옵션 실제 삽입본</p></div></div><div><span class="badge">12.6.0</span> 🔔 <b>안수원 이사</b></div></header><nav class="nav" id="nav"></nav><main class="page" id="app"></main><div class="modal" id="modal"><div class="modalBox"><div class="toolbar"><h2 id="modalTitle">등록</h2><button onclick="closeModal()">닫기</button></div><div id="modalBody"></div></div></div>
<script>
const menus=['대시보드','현장관리','견적관리','자재관리','세무관리','AS관리','설정'];let page='대시보드';
let productDB=[],panelRules=[],optionDB=[];let quoteType=localStorage.raon_quote_type||'싱글형';
let sites=JSON.parse(localStorage.raon_sites||'null')||[{name:'여수 OO상가 리모델링',status:'기계설치',client:'여수건축주',phone:'010-9876-5432',manager:'김현장',managerPhone:'010-1234-5678',address:'전남 여수시 OO로 123',contract:55000000,paid:30000000,cost:42550000,pre:'2024-06-24',preEnd:'2024-06-26',install:'2024-06-30',installEnd:'2024-07-02'},{name:'순천 신대지구 상가 신축',status:'선배관',client:'순천건축주',phone:'010-1111-2222',manager:'박소장',managerPhone:'010-3333-4444',address:'순천 신대지구',contract:120000000,paid:83000000,cost:92000000,pre:'2024-06-09',preEnd:'2024-06-10'}];
let quoteItems=JSON.parse(localStorage.raon_quote_items||'null')||[];let tax=JSON.parse(localStorage.raon_tax||'null')||{sales:[],purchases:[],cards:[],labor:[],deposits:[]};
const fmt=n=>(Number(n)||0).toLocaleString('ko-KR')+'원', num=v=>Number(String(v||'').replace(/[^0-9.-]/g,''))||0, unique=(arr,k)=>[...new Set(arr.map(x=>x[k]).filter(v=>v!==undefined&&v!==''))].sort((a,b)=>String(a).localeCompare(String(b),'ko'));
function save(){localStorage.raon_sites=JSON.stringify(sites);localStorage.raon_quote_items=JSON.stringify(quoteItems);localStorage.raon_quote_type=quoteType;localStorage.raon_tax=JSON.stringify(tax)}
async function init(){try{[productDB,panelRules,optionDB]=await Promise.all([fetch('/data/product_db.json').then(r=>r.json()),fetch('/data/panel_rules.json').then(r=>r.json()),fetch('/data/option_db.json').then(r=>r.json())]);}catch(e){alert('DB 로딩 오류: '+e.message)} render()}
function renderNav(){nav.innerHTML=menus.map(m=>`<button class="${page==m?'active':''}" onclick="page='${m}';render()">${m}</button>`).join('')}
function render(){renderNav(); if(page=='대시보드')dashboard(); if(page=='현장관리')fields(); if(page=='견적관리')quote(); if(page=='자재관리')materials(); if(page=='세무관리')taxPage(); if(page=='AS관리')asPage(); if(page=='설정')settings()}
function sums(){let contract=sites.reduce((a,s)=>a+num(s.contract),0), paid=sites.reduce((a,s)=>a+num(s.paid),0), cost=sites.reduce((a,s)=>a+num(s.cost),0);return{contract,paid,cost,unpaid:contract-paid,profit:contract-cost}}
function kpi(t,v,s,i){return `<div class="card kpi"><div><div>${t}</div><b>${v}</b><small>${s||''}</small></div><div class="ico">${i||''}</div></div>`}
function cal(){let events=[['9','선배관 작업<br>순천 신대지구','ev-blue'],['10','기계설치<br>여수 OO상가','ev-green'],['11','현장 방문<br>광양 OO빌딩','ev-orange'],['20','기계설치<br>순천 OO공장','ev-green'],['29','AS 방문<br>여수 OO상가','ev-blue']];let ev=Object.fromEntries(events.map(e=>[e[0],e]));let days=['26','27','28','29','30','31','1',...Array.from({length:30},(_,i)=>String(i+1)),'1','2','3','4','5','6'];return `<div class="calendar"><div class="dow">일</div><div class="dow">월</div><div class="dow">화</div><div class="dow">수</div><div class="dow">목</div><div class="dow">금</div><div class="dow">토</div>${days.slice(0,35).map((d,i)=>`<div class="day"><span class="date">${d}</span>${ev[d]?`<div class="event ${ev[d][2]}">${ev[d][1]}</div>`:''}</div>`).join('')}</div>`}
function dashboard(){let s=sums();app.innerHTML=`<div class="grid kpis">${kpi('진행 중 현장',sites.length+'개','현장관리 연동','🏢')}${kpi('오늘 일정','6건','대시보드 캘린더','🗓️')}${kpi('미수금',fmt(s.unpaid),'세무관리 연동','💳')}${kpi('입금 예정',fmt(24500000),'7일 이내','💰')}</div><div class="grid mainDash" style="margin-top:15px"><section class="card"><div class="toolbar"><h2>이번 달 일정</h2><div><b>2024년 6월</b> <button class="primary" onclick="modalSchedule()">일정 등록</button></div></div>${cal()}</section><div class="grid"><section class="card"><h2>빠른 이동</h2><div class="grid quick"><button onclick="page='현장관리';render()">🏢<br>현장 등록</button><button onclick="modalSchedule()">🗓️<br>일정 등록</button><button onclick="page='견적관리';render()">📄<br>견적서 작성</button><button onclick="page='자재관리';render()">📦<br>자재 등록</button><button onclick="page='세무관리';render()">🧾<br>세무관리</button></div></section><section class="card"><h2>계약 / 입금 현황</h2><div class="donutRow"><div class="donut" data-label="총 계약금\A${(s.contract/10000).toFixed(0)}만원"></div><div class="legend"><div>계약금액 <b>${fmt(s.contract)}</b></div><div>입금완료 <b>${fmt(s.paid)}</b></div><div>미수금 <b>${fmt(s.unpaid)}</b></div></div></div></section><section class="card"><h2>비용 / 손익 현황</h2><div class="donutRow"><div class="donut" data-label="예상 순익\A${(s.profit/10000).toFixed(0)}만원"></div><div class="legend"><div>매출액 <b>${fmt(s.contract)}</b></div><div>총 지출액 <b>${fmt(s.cost)}</b></div><div>예상 순익 <b>${fmt(s.profit)}</b></div></div></div></section></div></div>`}
function fields(){let sel=sites[0],unpaid=sel.contract-sel.paid,profit=sel.contract-sel.cost;app.innerHTML=`<div class="fieldLayout"><aside class="card"><div class="toolbar"><h2>현장 목록</h2><button class="primary" onclick="modalSite()">+ 등록</button></div>${sites.map(s=>`<div class="listItem"><b>${s.name}</b><br><span class="badge">${s.status}</span></div>`).join('')}</aside><section class="card"><div class="toolbar"><div><h1>${sel.name} <span class="badge">${sel.status}</span></h1><p>${sel.client} / ${sel.phone} / ${sel.address}</p></div><div><button onclick="modalSite()">수정</button><button class="danger">삭제</button></div></div><div class="grid moneyGrid">${kpi('총 계약금',fmt(sel.contract),'','')}${kpi('입금 완료',fmt(sel.paid),'','')}${kpi('미수금',fmt(unpaid),'','')}${kpi('예상 순익',fmt(profit),'','')}${kpi('마진율',((profit/sel.contract)*100).toFixed(1)+'%','','')}</div><div class="grid infoGrid" style="margin-top:14px">${['기본정보','일정','계약/입금','비용/손익','도면/사진','AS 관리'].map((x,i)=>`<div class="card"><h3>${i+1}. ${x}</h3><p>현장 기준 데이터 카드</p><button>상세/수정</button></div>`).join('')}</div></section><aside class="card rightInfo"><h2>현장관리 핵심</h2><p>일정 자동 연동</p><p>손익/세무 자동 반영</p><p>사진/도면 보관</p></aside></div>`}
function hpVal(v){let s=String(v||'');let m=s.match(/([0-9.]+)\s*HP/i)||s.match(/^([0-9.]+)$/);return m?Number(m[1]):0}
function itemHP(x){return hpVal(x.hp)}
function multiRate(items=quoteItems){let out=items.filter(x=>x.kind=='outdoor').reduce((a,x)=>a+itemHP(x)*num(x.qty),0);let inn=items.filter(x=>x.kind=='indoor').reduce((a,x)=>a+itemHP(x)*num(x.qty),0);let rate=out?inn/out*100:0;return{out,inn,rate}}
function quoteStatus(){let r=multiRate(); if(quoteType!='멀티형')return `<span class="pill good">싱글형: 실외기 1대 + 실내기 1대 기준</span>`; let cls=r.rate>130?'bad':r.rate>100?'warn':'good'; let msg=r.rate>130?'130% 초과 등록 불가':r.rate>100?'100% 초과 경고':'정상'; return `<span class="pill ${cls}">연결률 ${r.rate.toFixed(1)}% / 실내기 ${r.inn}HP / 실외기 ${r.out}HP — ${msg}</span>`}
function productLabel(p){return `${p.브랜드||''} ${p.모델명||''} / ${p.마력||''} / ${p.평형?p.평형+'평':''} / ${fmt(p.공급가)}`}
function getPanelOptions(model,p){let exact=panelRules.filter(r=>String(r.대상실내기모델||'').split('/').includes(model)); if(exact.length)return exact; let form=String(p?.형식||''), sub=String(p?.세부타입||''); if(String(p?.제품구분)=='멀티형'&&String(p?.구분).includes('실내기')){ if(form.includes('2WAY'))return [{자동판넬모델:'PFP-WS0SW',판넬종류:'2WAY 전용',판넬단가:0,비고:'가격등록 필요'}]; if(form.includes('4WAY')&&sub.includes('싱글'))return [{자동판넬모델:'PFP-WM5SW',판넬종류:'4WAY 싱글베인',판넬단가:0,비고:'가격등록 필요'}]; if(form.includes('4WAY'))return [{자동판넬모델:'PFP-WA4CW',판넬종류:'4WAY 듀얼베인',판넬단가:0,비고:'가격등록 필요'}]; if(form.includes('원형'))return [{자동판넬모델:'PFP-WV0SW',판넬종류:'원형 전용',판넬단가:0,비고:'가격등록 필요'}]; } return []}
function renderProductFilters(){let keys=['제품구분','용도','구분','형식','세부타입','등급','냉방구분']; let filtered=productDB.filter(r=>r.제품구분==quoteType); let vals={}; keys.forEach(k=>{let el=document.getElementById('pf_'+k);if(el&&el.value){vals[k]=el.value;filtered=filtered.filter(r=>String(r[k]||'')==el.value)}}); keys.forEach(k=>{let el=document.getElementById('pf_'+k); if(!el)return; let cur=el.value; let base=productDB.filter(r=>r.제품구분==quoteType).filter(r=>Object.entries(vals).every(([kk,v])=>kk==k||String(r[kk]||'')==v)); el.innerHTML='<option value="">전체</option>'+unique(base,k).map(v=>`<option ${v==cur?'selected':''}>${v}</option>`).join('')}); let ms=document.getElementById('qProductModel'); if(ms)ms.innerHTML='<option value="">모델 선택</option>'+filtered.map(p=>`<option value="${p.모델명}">${productLabel(p)}</option>`).join(''); let c=document.getElementById('productCount'); if(c)c.textContent=filtered.length+'개 모델'; renderPanelChoice()}
function renderPanelChoice(){let model=document.getElementById('qProductModel')?.value;let p=productDB.find(x=>x.모델명==model);let box=document.getElementById('panelChoiceBox');if(!box)return;let panels=getPanelOptions(model,p); if(!panels.length){box.innerHTML='<span class="muted">자동 판넬 없음</span>';return} if(panels.length==1){box.innerHTML=`<b>자동 판넬:</b> ${panels[0].자동판넬모델} (${panels[0].판넬종류}) ${panels[0].판넬단가?fmt(panels[0].판넬단가):'가격등록 필요'}`;return} box.innerHTML=`<label>전용 판넬 선택</label><select id="qPanelChoice">${panels.map(p=>`<option value="${p.자동판넬모델}">${p.판넬종류} - ${p.자동판넬모델} (${p.판넬단가?fmt(p.판넬단가):'가격등록 필요'})</option>`).join('')}</select>`}
function addEquipment(){let model=qProductModel.value;if(!model)return alert('모델을 선택해주세요.');let p=productDB.find(x=>x.모델명==model);let qty=num(qQty.value)||1;let kind=p.제품구분=='멀티형'?(String(p.구분).includes('실외기')?'outdoor':'indoor'):'single';let newItem={section:p.제품구분=='멀티형'?(kind=='outdoor'?'A. 실외기':'B. 실내기'):'A. 장비',kind,type:'equipment',brand:p.브랜드||'LG',model:p.모델명,hp:p.마력||'',pyeong:p.평형?p.평형+'평':'',qty,price:num(p.공급가),note:[p.제품구분,p.용도,p.구분,p.형식,p.세부타입,p.등급,p.냉방구분].filter(Boolean).join(' / ')};let test=[...quoteItems,newItem];let r=multiRate(test);if(quoteType=='멀티형'&&kind=='indoor'&&r.rate>130)return alert('연결률 130% 초과로 등록할 수 없습니다. 실외기를 추가하거나 실내기 수량을 조정해주세요.');quoteItems.push(newItem);let panels=getPanelOptions(p.모델명,p);if(panels.length&&kind=='indoor'){let panel=panels[0];let sel=document.getElementById('qPanelChoice');if(sel&&sel.value)panel=panels.find(x=>x.자동판넬모델==sel.value)||panels[0];quoteItems.push({section:'C. 전용 판넬',kind:'panel',type:'panel',brand:'LG',model:panel.자동판넬모델,hp:'',pyeong:'',qty,price:num(panel.판넬단가),note:`전용 판넬 자동추가 (${panel.판넬종류})`})} if(quoteType=='싱글형')newItem.note+=' / 무선리모컨 기본 포함';save();render();alert('장비가 추가되었습니다.')}
function addOption(){let model=optSelect.value;if(!model)return alert('옵션을 선택해주세요.');let o=optionDB.find(x=>x.model==model||x.name==model);let qty=num(optQty.value)||1;quoteItems.push({section:o.quoteSection||'E. 추가비',kind:'option',type:'option',brand:'LG',model:o.model||o.name,hp:'',pyeong:'',qty,price:num(o.price),note:`${o.category} / ${o.name} / ${o.note||''}`});save();render();}
function editItem(i){let it=quoteItems[i];let q=prompt('수량',it.qty);if(q===null)return;let p=prompt('단가',it.price);if(p===null)return;it.qty=num(q)||1;it.price=num(p);save();render()}function delItem(i){if(confirm('삭제하시겠습니까?')){quoteItems.splice(i,1);save();render()}}
function sectionTable(section){let rows=quoteItems.map((x,i)=>({...x,i})).filter(x=>x.section==section); if(!rows.length)return ''; return `<section class="card"><div class="toolbar"><h2>${section}</h2><span class="muted">${rows.length}개</span></div><table class="sheetTable"><tr><th>브랜드</th><th>모델/항목</th><th>마력</th><th>평형</th><th>수량</th><th>단가</th><th>금액</th><th>비고</th><th>관리</th></tr>${rows.map(x=>`<tr><td>${x.brand||''}</td><td>${x.model}</td><td>${x.hp||''}</td><td>${x.pyeong||''}</td><td>${x.qty}</td><td>${fmt(x.price)}</td><td>${fmt(x.price*x.qty)}</td><td>${x.note||''}</td><td><button onclick="editItem(${x.i})">수정</button> <button class="danger" onclick="delItem(${x.i})">삭제</button></td></tr>`).join('')}</table></section>`}
function quote(){let total=quoteItems.reduce((a,x)=>a+num(x.qty)*num(x.price),0),vat=Math.round(total*.1);let sections=quoteType=='멀티형'?['A. 실외기','B. 실내기','C. 전용 판넬','D. 제어/옵션','E. 추가비']:['A. 장비','B. 설치비','C. 추가비','D. 제어/옵션'];app.innerHTML=`<section><div class="toolbar"><div><h1>견적관리</h1><small class="muted">싱글형/멀티형 견적서 분리 + Product DB/옵션 실제 삽입</small></div><div><a href="/assets/RAON_Product_DB_v2.xlsx" download><button>제품 DB 다운로드</button></a></div></div><div class="quoteTabs"><button class="${quoteType=='싱글형'?'active':''}" onclick="quoteType='싱글형';save();render()">싱글형 견적서</button><button class="${quoteType=='멀티형'?'active':''}" onclick="quoteType='멀티형';save();render()">멀티형 견적서</button>${quoteStatus()}</div><div class="quoteInfoGrid"><div class="card"><h2>고객 정보</h2><div class="quoteFormGrid"><div><label>고객명</label><input></div><div><label>연락처</label><input></div><div class="wide"><label>현장명</label><input></div><div class="wide"><label>현장 주소</label><input></div></div></div><div class="card"><h2>견적 제출 업체정보</h2><table class="miniTable"><tr><th>상호</th><td>(주)라온이앤지</td></tr><tr><th>대표자</th><td>문지원</td></tr><tr><th>담당</th><td>안수원 이사</td></tr><tr><th>주소</th><td>전남 순천시 구암길 6-5</td></tr></table></div></div><section class="card" id="productFilterBox"><div class="toolbar"><h2>장비 DB 선택</h2><b id="productCount">0개</b></div><div class="quoteFormGrid">${['제품구분','용도','구분','형식','세부타입','등급','냉방구분'].map(k=>`<div><label>${k}</label><select id="pf_${k}" onchange="renderProductFilters()"></select></div>`).join('')}<div class="wide"><label>모델명</label><select id="qProductModel" onchange="renderPanelChoice()"></select></div><div><label>수량</label><input id="qQty" type="number" min="1" value="1"></div><div><label>판넬 자동매칭</label><div id="panelChoiceBox" class="card" style="padding:8px;box-shadow:none"></div></div></div><div class="actions"><button class="primary" onclick="addEquipment()">+ 선택 장비 추가</button></div><p class="muted">싱글형은 무선리모컨 기본 포함, 유선리모컨은 선택 구매입니다. 멀티형은 리모컨 별도 구매입니다.</p></section><section class="card"><div class="toolbar"><h2>옵션 / 추가비 DB</h2><span class="muted">분지관, T분지관, 중앙제어, 공기청정키트, 리모컨, 실외기 받침대, 에어가이드 포함</span></div><div class="quoteFormGrid"><div><label>카테고리</label><select id="optCat" onchange="renderOptionSelect()"><option value="">전체</option>${unique(optionDB,'category').map(x=>`<option>${x}</option>`).join('')}</select></div><div><label>옵션</label><select id="optSelect"></select></div><div><label>수량</label><input id="optQty" type="number" min="1" value="1"></div><div style="align-self:end"><button class="primary" onclick="addOption()">+ 옵션 추가</button></div></div></section>${sections.map(sectionTable).join('')}<div class="card"><div class="toolbar"><h2>합계</h2><div><b>공급가 ${fmt(total)}</b> / VAT ${fmt(vat)} / <b style="color:#2563eb">총액 ${fmt(total+vat)}</b></div></div></div></section>`; setTimeout(()=>{renderProductFilters();renderOptionSelect()},0)}
function renderOptionSelect(){let cat=document.getElementById('optCat')?.value||'';let rows=cat?optionDB.filter(x=>x.category==cat):optionDB;let sel=document.getElementById('optSelect'); if(sel)sel.innerHTML='<option value="">선택</option>'+rows.map(o=>`<option value="${o.model||o.name}">${o.category} / ${o.name} ${o.model?'- '+o.model:''} / ${o.price?fmt(o.price):'가격등록 필요'}</option>`).join('')}
const matCats={'배관':['직관 6','직관 9','직관 12','직관 15','직관 19','직관 22','직관 28','직관 34','직관 41','연관 6/9','연관 12/6','연관 15/6','연관 15/9','연관 19/9'],'배관보온제':['6mm 9T','6mm 13T','6mm 19T','9mm 9T','9mm 13T','9mm 19T','12mm 9T','12mm 13T','12mm 19T','15mm 9T','15mm 13T','15mm 19T','19mm 19T','22mm 19T','28mm 19T','34mm 19T','41mm 19T'],'PVC부속':['25엘보','25T','25소켓','40엘보','40T','40소켓','25/40이경티','40/25레듀샤','40/40T'],'행거':['원터치행거 50A','65A','80A','100A','사이트행거 50A','멀티행거 소','중','대'],'전산대/소모품':['전산대 2.5M','전산대 3M','실리콘','폼건','은박테이프','EPDM테이프'],'통신선':['0.75/2P','1.0/2P','1.0/2P실드','1.0/4P','VCTF 2.5/3P'],'전원선':['2.5 IV선','4.0/4P','6.0/4P','2.5/4P','4.0/3P','6.0/3P'],'냉매':['R22','R32','R410A','R407C'],'드레인펌프':['벽걸이 4M','벽걸이 6M','벽걸이 9M','스탠드 4M','스탠드 6M','스탠드 9M'],'멀티부자재':['분지관','T-분지관'],'제어/옵션':['중앙제어','통합제어','공기청정키트','리모컨'],'설치구조물':['1단 바닥앵글','2단 앵글','실외기 받침대','에어가이드']};
function materials(){app.innerHTML=`<div class="grid matGrid"><section class="card"><h1>자재내역 붙여넣기</h1><textarea id="pasteMat" rows="10" placeholder="15/9 배관 2롤\n25엘보 30개\nR410A 1통\nPBL-1601H2 1개"></textarea><button class="primary" onclick="parseMat()">자동분석</button><div id="matResult"></div></section><section class="card"><h1>자재 DB</h1>${Object.entries(matCats).map(([k,v])=>`<h3>${k}</h3><div class="chips">${v.map(x=>`<span class="chip">${x}</span>`).join('')}</div>`).join('')}</section></div>`}
function parseMat(){let lines=pasteMat.value.split('\n').filter(Boolean);matResult.innerHTML='<h3>분석 결과</h3><table class="miniTable"><tr><th>품목구분</th><th>품명</th><th>수량</th></tr>'+lines.map(line=>{let cat='기타';for(let [k,v] of Object.entries(matCats)){if(v.some(x=>line.includes(x.split(' ')[0]))||line.includes(k)){cat=k;break}}return `<tr><td>${cat}</td><td>${line}</td><td>자동</td></tr>`}).join('')+'</table>'}
function taxPage(){let s=sums();app.innerHTML=`<div class="toolbar"><h1>세무관리</h1><button onclick="openTaxModal('카드내역 붙여넣기')">카드내역 붙여넣기</button></div><div class="grid taxKpis">${kpi('월 매출',fmt(s.contract),'','📈')}${kpi('월 매입',fmt(s.cost),'','🛒')}${kpi('미수금',fmt(s.unpaid),'','💳')}${kpi('입금예정',fmt(24500000),'','🗓️')}${kpi('인건비',fmt(1440000),'','👥')}${kpi('예상 VAT',fmt(Math.max(0,Math.round((s.contract-s.cost)/11))),'','%')}</div><div class="grid taxMain" style="margin-top:15px"><section class="card"><h2>최근 매출</h2><table class="miniTable">${sites.map(x=>`<tr><td>${x.name}</td><td>${fmt(x.contract)}</td></tr>`).join('')}</table></section><section class="card"><h2>홈택스</h2><button onclick="window.open('https://www.hometax.go.kr')">홈택스 열기</button><button>전자세금계산서 발행</button></section></div>`}
function openTaxModal(t){modalTitle.textContent=t;modalBody.innerHTML='<textarea rows="8" placeholder="2026-06-25 SK주유소 120000"></textarea><div class="actions"><button onclick="closeModal()">취소</button><button class="primary" onclick="alert(\'저장되었습니다.\');closeModal()">저장</button></div>';modal.classList.add('on')}
function modalSchedule(){modalTitle.textContent='일정 등록';modalBody.innerHTML='<div class="formGrid"><div><label>현장</label><input></div><div><label>종류</label><select><option>선배관</option><option>기계설치</option><option>AS</option></select></div><div><label>시작일</label><input type="date"></div><div><label>종료일</label><input type="date"></div></div><div class="actions"><button onclick="closeModal()">취소</button><button class="primary" onclick="alert(\'저장되었습니다.\');closeModal()">저장</button></div>';modal.classList.add('on')}
function modalSite(){modalTitle.textContent='현장 등록/수정';modalBody.innerHTML='<div class="formGrid">'+['현장명','고객명','연락처','주소','총 계약금','입금완료'].map(x=>`<div><label>${x}</label><input></div>`).join('')+'</div><div class="actions"><button onclick="closeModal()">취소</button><button class="primary" onclick="alert(\'저장되었습니다.\');closeModal()">저장</button></div>';modal.classList.add('on')}
function closeModal(){modal.classList.remove('on')}function asPage(){app.innerHTML='<section class="card"><h1>AS관리</h1><p>AS 접수, 사진, 방문 이력 관리.</p></section>'}function settings(){app.innerHTML='<section class="card"><h1>설정</h1><p>회사정보, 권한, 기본단가 관리.</p></section>'}
init();
</script></body></html>
