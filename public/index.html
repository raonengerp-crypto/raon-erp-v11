<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>RAON E&G ERP v12</title><style>
:root{--blue:#2563eb;--navy:#071a36;--bg:#f3f7fb;--card:#fff;--line:#dbe5f1;--text:#07142d;--muted:#66748a;--green:#0ea85c;--red:#ef4444;--orange:#f97316;--purple:#7c3aed;--shadow:0 10px 26px rgba(15,35,75,.07)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,'Noto Sans KR',sans-serif;font-size:clamp(12px,.82vw,15px)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0;border-radius:10px;padding:9px 14px;background:#fff;border:1px solid var(--line);font-weight:700}.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.danger{color:var(--red);border-color:#fecaca;background:#fff}.top{background:var(--navy);color:#fff;padding:clamp(10px,1vw,16px) clamp(14px,1.3vw,22px);display:flex;align-items:center;justify-content:space-between}.brand{display:flex;gap:12px;align-items:center}.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#22c55e);display:grid;place-items:center;font-size:24px;font-weight:900}.brand h1{margin:0;font-size:clamp(20px,1.7vw,31px)}.brand p{margin:2px 0 0;color:#dbeafe}.nav{height:54px;background:#fff;display:flex;align-items:center;gap:28px;padding:0 22px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}.nav button{border:0;border-radius:0;background:transparent;height:54px;padding:0 8px}.nav button.active{color:var(--blue);border-bottom:3px solid var(--blue)}.page{padding:clamp(10px,1.1vw,20px);max-width:1920px;margin:auto}.grid{display:grid;gap:clamp(10px,1vw,16px)}.kpis{grid-template-columns:repeat(4,1fr)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:clamp(13px,1.1vw,22px)}.kpi{display:flex;align-items:center;justify-content:space-between;min-height:clamp(92px,8vw,132px)}.kpi b{font-size:clamp(24px,2vw,38px);display:block;line-height:1.1}.ico{width:clamp(42px,4vw,70px);height:clamp(42px,4vw,70px);border-radius:50%;background:#eaf1ff;display:grid;place-items:center;font-size:clamp(22px,2vw,34px)}.mainDash{grid-template-columns:1.55fr .95fr}.sideStack{display:grid;gap:16px}.calHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}.day,.dow{min-height:clamp(54px,6.5vh,95px);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px}.dow{min-height:32px;text-align:center;font-weight:800;background:#fafcff}.day:nth-child(7n),.dow:nth-child(7n){border-right:0}.date{font-weight:800;color:#0f2a4d}.sun{color:red}.sat{color:#06f}.event{font-size:clamp(10px,.7vw,12px);padding:5px;border-radius:7px;margin-top:4px;line-height:1.25}.ev-blue{background:#dbeafe;color:#0752c5}.ev-green{background:#dcfce7;color:#067647}.ev-orange{background:#ffedd5;color:#c2410c}.ev-purple{background:#f3e8ff;color:#6b21a8}.quick{grid-template-columns:repeat(5,1fr)}.quick button{height:76px}.donutRow{display:grid;grid-template-columns:170px 1fr;align-items:center;gap:18px}.donut{width:150px;height:150px;border-radius:50%;background:conic-gradient(#2563eb 0 42%,#10b981 42% 76%,#f97316 76% 91%,#94a3b8 91%);position:relative}.donut:after{content:attr(data-label);white-space:pre;position:absolute;inset:38px;border-radius:50%;background:#fff;display:grid;place-items:center;text-align:center;font-weight:800;font-size:13px}.legend div{display:flex;justify-content:space-between;border-bottom:1px solid #eef2f7;padding:7px 0}.fieldLayout{display:grid;grid-template-columns:290px 1fr 330px;gap:16px}.listItem{border:1px solid var(--line);border-radius:10px;padding:12px;margin:8px 0;background:#fff}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;background:#dbeafe;color:#0b5ed7;font-weight:800}.fieldHero{display:flex;justify-content:space-between;gap:20px;align-items:start}.meta{display:flex;flex-wrap:wrap;gap:20px;color:#334155}.moneyGrid{grid-template-columns:repeat(5,1fr)}.infoGrid{grid-template-columns:repeat(3,1fr)}.miniTable{width:100%;border-collapse:collapse}.miniTable th,.miniTable td{border-bottom:1px solid #e6edf6;padding:9px;text-align:left}.miniTable th{background:#f8fafc}.taxKpis{grid-template-columns:repeat(6,1fr)}.taxMain{grid-template-columns:1.2fr .8fr .8fr}.tabsGone{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.modal{position:fixed;inset:0;background:rgba(2,8,23,.45);display:none;align-items:center;justify-content:center;z-index:20}.modal.on{display:flex}.modalBox{background:#fff;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.25);padding:22px;width:min(760px,94vw);max-height:90vh;overflow:auto}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}label{display:block;font-weight:800;color:#475569;margin-bottom:5px}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;background:#fff}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.quoteSheet .section{margin-bottom:18px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.sheetTable{width:100%;border-collapse:collapse;background:#fff}.sheetTable th,.sheetTable td{border:1px solid var(--line);padding:8px}.sheetTable input,.sheetTable select{border:0;padding:6px;background:transparent}.matGrid{grid-template-columns:1fr 1fr}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:7px 10px;background:#eef4ff;border:1px solid #d6e6ff;border-radius:999px;font-weight:700}.chart{height:250px;background:linear-gradient(to top,#f8fbff,#fff);border:1px solid var(--line);border-radius:12px;position:relative;padding:20px}.bars{display:flex;align-items:end;height:180px;gap:20px}.bar{width:28px;background:#2563eb;border-radius:6px 6px 0 0}.bar.g{background:#22c55e}.bar.o{background:#f59e0b}.hide{display:none!important}
@media(max-width:1450px){.taxKpis{grid-template-columns:repeat(3,1fr)}.kpis{grid-template-columns:repeat(2,1fr)}.mainDash,.taxMain{grid-template-columns:1fr}.fieldLayout{grid-template-columns:250px 1fr}.rightInfo{display:none}.moneyGrid,.infoGrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.nav{overflow:auto;gap:14px}.fieldLayout,.matGrid{grid-template-columns:1fr}.kpis,.taxKpis,.moneyGrid,.infoGrid{grid-template-columns:1fr}.quick{grid-template-columns:repeat(2,1fr)}.formGrid{grid-template-columns:1fr}.day{min-height:80px}}
</style></head><body>
<header class="top"><div class="brand"><div class="logo">R</div><div><h1>RAON E&G ERP v12 실사용판</h1><p>현장을 중심으로 일정, 입금, 비용, 자재, AS까지 통합 관리합니다.</p></div></div><div><span class="badge">Phase 1</span> 🔔 <b>안수원 이사</b></div></header>
<nav class="nav" id="nav"></nav><main class="page" id="app"></main>
<div class="modal" id="modal"><div class="modalBox"><div class="toolbar"><h2 id="modalTitle">등록</h2><button onclick="closeModal()">닫기</button></div><div id="modalBody"></div></div></div>
<script>
const menus=['대시보드','현장관리','견적관리','자재관리','세무관리','AS관리','설정'];let page='대시보드';
let sites=JSON.parse(localStorage.raon_sites||'null')||[{name:'여수 OO상가 리모델링',status:'기계설치',client:'여수건축주',phone:'010-9876-5432',manager:'김현장',managerPhone:'010-1234-5678',address:'전남 여수시 OO로 123',contract:55000000,paid:30000000,cost:42550000,pre:'2024-06-24',preEnd:'2024-06-26',install:'2024-06-30',installEnd:'2024-07-02'},{name:'순천 신대지구 상가 신축',status:'선배관',client:'순천건축주',phone:'010-1111-2222',manager:'박소장',managerPhone:'010-3333-4444',address:'순천 신대지구',contract:120000000,paid:83000000,cost:92000000,pre:'2024-06-09',preEnd:'2024-06-10'}];
let tax=JSON.parse(localStorage.raon_tax||'null')||{sales:[],purchases:[{date:'2025-06-10',vendor:'자재상',item:'배관자재',amount:5327273}],cards:[],labor:[{date:'2025-06-12',name:'장종수',site:'여수 OO상가',days:2,rate:180000}],deposits:[]};
let quotes=JSON.parse(localStorage.raon_quotes||'null')||[];
function save(){localStorage.raon_sites=JSON.stringify(sites);localStorage.raon_tax=JSON.stringify(tax);localStorage.raon_quotes=JSON.stringify(quotes)}
function fmt(n){return (Number(n)||0).toLocaleString('ko-KR')+' 원'}function supply(total){return Math.round((Number(total)||0)/1.1)}function vat(total){return (Number(total)||0)-supply(total)}
function renderNav(){nav.innerHTML=menus.map(m=>`<button class="${m==page?'active':''}" onclick="page='${m}';render()">${m}</button>`).join('')}
function render(){renderNav(); if(page=='대시보드')dashboard(); if(page=='현장관리')fields(); if(page=='견적관리')quote(); if(page=='자재관리')materials(); if(page=='세무관리')taxPage(); if(page=='AS관리')asPage(); if(page=='설정')settings()}
function sums(){let contract=sites.reduce((a,s)=>a+(+s.contract||0),0), paid=sites.reduce((a,s)=>a+(+s.paid||0),0), cost=sites.reduce((a,s)=>a+(+s.cost||0),0);return{contract,paid,cost,unpaid:contract-paid,profit:contract-cost}}
function kpi(title,val,sub,icon){return `<div class="card kpi"><div><div>${title}</div><b>${val}</b><small>${sub||''}</small></div><div class="ico">${icon}</div></div>`}
function cal(){let events=[['9','선배관 작업<br>순천 신대지구<br>09:00 ~ 12:00','ev-blue'],['10','기계설치<br>여수 OO상가<br>13:00 ~ 15:00','ev-green'],['11','현장 방문<br>광양 OO빌딩<br>11:00 ~ 13:00','ev-orange'],['20','기계설치<br>순천 OO공장<br>13:00 ~ 17:00','ev-green'],['29','AS 방문<br>여수 OO상가<br>10:00 ~ 12:00','ev-purple']];let ev=Object.fromEntries(events.map(e=>[e[0],e]));let days=['26','27','28','29','30','31','1',...Array.from({length:30},(_,i)=>String(i+1)),'1','2','3','4','5','6'];return `<div class="calendar"><div class="dow sun">일</div><div class="dow">월</div><div class="dow">화</div><div class="dow">수</div><div class="dow">목</div><div class="dow">금</div><div class="dow sat">토</div>${days.slice(0,35).map((d,i)=>`<div class="day"><span class="date ${i%7==0?'sun':i%7==6?'sat':''}">${d}</span>${ev[d]?`<div class="event ${ev[d][2]}">${ev[d][1]}</div>`:''}</div>`).join('')}</div>`}
function dashboard(){let s=sums();app.innerHTML=`<div class="grid kpis">${kpi('진행 중 현장',sites.length+' 개','총 '+(sites.length+16)+'개 현장 중','🏢')}${kpi('오늘 일정','6 건','오늘 등록된 일정','🗓️')}${kpi('미수금',fmt(s.unpaid),'총 미수금액','💳')}${kpi('입금 예정',fmt(24500000),'7일 이내 입금 예정','💰')}</div><div class="grid mainDash" style="margin-top:16px"><section class="card"><div class="calHead"><h2>이번 달 일정</h2><div><button>‹</button><b style="margin:0 18px">2024년 6월</b><button>›</button><button>오늘</button><button class="primary" onclick="modalSchedule()">일정 등록</button></div></div>${cal()}<p style="text-align:center"><span class="chip">선배관 작업</span><span class="chip">기계설치</span><span class="chip">현장 방문</span><span class="chip">AS 방문</span></p></section><div class="sideStack"><section class="card"><h2>빠른 이동</h2><div class="grid quick"><button onclick="page='현장관리';render()">🏢<br>현장 등록</button><button onclick="modalSchedule()">🗓️<br>일정 등록</button><button onclick="openTaxModal('입금 등록')">💵<br>입금 등록</button><button onclick="page='자재관리';render()">📦<br>자재 등록</button><button onclick="page='견적관리';render()">📄<br>견적서 작성</button></div></section><section class="card"><h2>계약 / 입금 현황</h2><div class="donutRow"><div class="donut" data-label="총 계약금\A${(s.contract/10000).toFixed(0)}만원"></div><div class="legend"><div><span>계약금액</span><b>${fmt(s.contract)}</b></div><div><span>입금완료</span><b>${fmt(s.paid)}</b></div><div><span>미수금</span><b>${fmt(s.unpaid)}</b></div></div></div></section><section class="card"><h2>비용 / 손익 현황</h2><div class="donutRow"><div class="donut" data-label="예상 순익\A${(s.profit/10000).toFixed(0)}만원"></div><div class="legend"><div><span>매출액</span><b>${fmt(s.contract)}</b></div><div><span>총 지출액</span><b>${fmt(s.cost)}</b></div><div><span>예상 순익</span><b>${fmt(s.profit)}</b></div></div></div></section></div></div>`}
function fields(){let sel=sites[0],unpaid=sel.contract-sel.paid,profit=sel.contract-sel.cost;app.innerHTML=`<div class="fieldLayout"><aside class="card"><div class="toolbar"><h2>현장 목록</h2><button class="primary" onclick="modalSite()">+ 현장 등록</button></div><input placeholder="현장명 검색">${sites.map((s,i)=>`<div class="listItem" onclick="selectSite=${i};fields()"><b>${s.name}</b><br><span class="badge">${s.status}</span><span style="float:right">${s.pre||''}</span></div>`).join('')}</aside><section class="card"><div class="fieldHero"><div><h1>${sel.name} <span class="badge">${sel.status}</span></h1><div class="meta"><span>고객명 ${sel.client}</span><span>연락처 ${sel.phone}</span><span>현장소장 ${sel.manager}</span><span>주소 ${sel.address}</span></div></div><div><button onclick="modalSite(0)">수정</button><button class="danger" onclick="if(confirm('삭제하시겠습니까?')){sites.shift();save();fields()}">삭제</button></div></div><div class="grid moneyGrid" style="margin:18px 0">${kpi('총 계약금',fmt(sel.contract),'부가세별도','')}${kpi('입금 완료',fmt(sel.paid),'','')}${kpi('미수금',fmt(unpaid),'','')}${kpi('예상 순익',fmt(profit),'','')}${kpi('마진율',((profit/sel.contract)*100).toFixed(1)+'%','','')}</div><div class="grid infoGrid"><div class="card"><h3>1. 기본정보</h3><table class="miniTable"><tr><th>고객명</th><td>${sel.client}</td></tr><tr><th>연락처</th><td>${sel.phone}</td></tr><tr><th>주소</th><td>${sel.address}</td></tr></table></div><div class="card"><h3>2. 일정</h3><p>🔵 선배관 ${sel.pre} ~ ${sel.preEnd}</p><p>🟢 기계설치 ${sel.install} ~ ${sel.installEnd}</p><button onclick="page='대시보드';render()">일정 관리 바로가기</button></div><div class="card"><h3>3. 계약/입금</h3><table class="miniTable"><tr><th>총계약금</th><td>${fmt(sel.contract)}</td></tr><tr><th>입금완료</th><td>${fmt(sel.paid)}</td></tr><tr><th>미수금</th><td style="color:red">${fmt(unpaid)}</td></tr></table></div><div class="card"><h3>4. 비용/손익</h3><table class="miniTable"><tr><th>총비용</th><td>${fmt(sel.cost)}</td></tr><tr><th>순익</th><td style="color:green">${fmt(profit)}</td></tr></table></div><div class="card"><h3>5. 도면/사진</h3><div class="chips"><span class="chip">도면_1층.dwg</span><span class="chip">시공전.jpg</span><span class="chip">시공중.jpg</span><button>+ 파일 추가</button></div></div><div class="card"><h3>6. AS 관리</h3><p>AS 보증기간 2년</p><p>AS 이력 0건</p><button>AS 이력 관리</button></div></div></section><aside class="card rightInfo"><h2>현장관리 핵심 기능</h2><p>현장 정보 통합 관리</p><p>일정 자동 연동</p><p>실시간 손익 확인</p><p>세무/보고서 자동 반영</p></aside></div>`}
const productDB=['LG PW0600 냉난방 벽걸이 2HP','LG PQ0900 냉방전용 스탠드 3HP','LG TW1450A9SR 4WAY 5HP','LG 원형 시스템 4HP','삼성 4WAY 5HP','캐리어 스탠드 3HP'];
function quote(){app.innerHTML=`<section class="card quoteSheet"><div class="toolbar"><h1>견적관리</h1><button class="primary" onclick="addQuoteRow('eq')">+ 장비</button></div><div class="section"><h2>A. 장비</h2><table class="sheetTable" id="qtA"><tr><th>브랜드</th><th>모델명</th><th>마력</th><th>평형</th><th>수량</th><th>단가</th><th>금액</th><th>관리</th></tr>${rowA('LG','TW1450A9SR','5HP','40평',1,3500000)}</table><small>내부 필터: 싱글형/멀티형, 품명, 냉방구분(PW=냉난방, PQ=냉전)</small></div><div class="section"><h2>B. 설치비</h2><table class="sheetTable"><tr><th>설치비 내역</th><th>수량</th><th>단가</th><th>금액</th><th>관리</th></tr>${rowB('설치 인건비',1,450000)}${rowB('냉매배관비',10,30000)}${rowB('드레인배관 작업',1,100000)}</table></div><div class="section"><h2>C. 추가비</h2><table class="sheetTable"><tr><th>항목</th><th>규격</th><th>수량</th><th>단가</th><th>금액</th><th>관리</th></tr>${rowC('동배관 추가','15/9',5,30000)}${rowC('바닥앵글','',1,120000)}${rowC('크레인','',1,400000)}</table></div><div class="card"><h2>합계</h2><p>공급가액 4,920,000원 / VAT 492,000원 / 총 견적금액 5,412,000원</p><button class="primary">PDF 출력</button></div></section>`}
function rowA(b,m,h,p,q,price){return `<tr><td>${b}</td><td>${m}</td><td>${h}</td><td>${p}</td><td>${q}</td><td>${fmt(price)}</td><td>${fmt(q*price)}</td><td><button>수정</button> <button class="danger">삭제</button></td></tr>`}function rowB(n,q,p){return `<tr><td>${n}</td><td>${q}</td><td>${fmt(p)}</td><td>${fmt(q*p)}</td><td><button>수정</button> <button class="danger">삭제</button></td></tr>`}function rowC(a,s,q,p){return `<tr><td>${a}</td><td>${s}</td><td>${q}</td><td>${fmt(p)}</td><td>${fmt(q*p)}</td><td><button>수정</button> <button class="danger">삭제</button></td></tr>`}
